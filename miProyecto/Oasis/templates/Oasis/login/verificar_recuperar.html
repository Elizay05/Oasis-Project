{% extends 'Oasis/barNav.html' %}
{% load static %}

{% block titulo %}Login{% endblock %}

{% block contenedor %}

{% if check %}
    <form action="{% url 'verificar_recuperar' %}" method="post" class="mb-3 mt-5 w-100 h-100 ml-0 mr-0 mx-auto" style="max-width: 540px;">
        {% csrf_token %}
        <input type="hidden" name="check" value="{{ check }}"/>
        <input type="hidden" name="correo" class="form-control" placeholder="Correo" required="" value="{{correo}}"><br>
        <label>Contraseña nueva</label>
        <input type="password" name="nueva1" required="" class="form-control"><br>
        <label>Repetir Contraseña</label>
        <input type="password" name="nueva2" required="" class="form-control"><br>

        <button type="submit" class="btn btn-info">Guardar</button>
    </form>
{% else %}
    <form action="{% url 'verificar_recuperar' %}" method="post" class="col-3 m-auto mt-5">
        <h3>Ingrese el token enviado al correo</h3>
        {% csrf_token %}
        <input type="hidden" name="correo" class="form-control" placeholder="Correo" required="" value="{{correo}}"><br>
        <input type="text" name="token" class="form-control" placeholder="Token" required=""><br>
        <button type="submit" class="btn btn-info">Verificar...</button>
    </form>
{% endif %}
{% endblock %}
{% block contenedor %}
<section class="contenedorInicio">
  <div class="imagen">
    <img src="{% static 'Oasis/img/fondoRegistro4.jpg' %}" alt="Fondo Registro">
  </div>
  <div class="contentRegistro">
    <div class="Registro">
      <h1>REGISTRO</h1>
      <div class="formulario">
        <form class="form">
          <div class="group">
            <input required="true" class="main-input" type="text">
            <span class="highlight-span"></span>
            <label class="lebal-email">Primer Nombre</label>
          </div>
          <div class="container-1">
            <div class="group">
              <input required="true" class="main-input" type="text">
              <span class="highlight-span"></span>
              <label class="lebal-email">Apellido</label>
            </div>
          </div>
          <div class="container-1">
            <div class="group">
              <input required="true" class="main-input" type="text">
              <span class="highlight-span"></span>
              <label class="lebal-email">Email</label>
            </div>
          </div>
          <div class="container-1">
            <div class="group">
              <input required="true" class="main-input" type="password">
              <span class="highlight-span"></span>
              <label class="lebal-email">Contraseña</label>
            </div>
          </div>
          <div class="container-1">
            <div class="group">
              <input required="true" class="main-input" type="password">
              <span class="highlight-span"></span>
              <label class="lebal-email">Confirmar Contraseña</label>
            </div>
          </div>
          <div class="container-1">
            <div class="group">
              <input required="true" class="main-input" type="checkbox">
              <span class="highlight-span"></span>
              <label class="lebal-email">Soy mayor de edad</label>
            </div>
          </div>
        </form>
      </div>
      <div class="contentbutton">
        <button class="btn-normalpeque">Registrarse</button>
      </div>
    </div>
  </div>
</section>
{% endblock %}
